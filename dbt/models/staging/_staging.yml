version: 2

models:
  - name: stg_homebuilder_sales
    description: >
      One row per home sale contract. Thin rename layer over the raw source with
      three status flags and two derived columns validated against the source.
    tests:
      # Verifies days_to_close matches DATEDIFF(contract_date, close_date) for all closed rows.
      - dbt_utils.expression_is_true:
          expression: "days_to_close_calc = days_to_close OR close_date IS NULL"
      # Verifies contract_price = base_price + upgrade_amount − incentive_amount.
      - dbt_utils.expression_is_true:
          expression: "contract_price_calc = contract_price"
    columns:
      - name: contract_id
        description: Unique contract identifier.
        tests:
          - unique
          - not_null
          - dbt_utils.not_empty_string

      - name: region
        description: Sales region.
        tests:
          - not_null
          - accepted_values:
              values:
                - South Texas
                - Rio Grande Valley
                - Coastal Bend

      - name: community
        description: Subdivision or community name.
        tests:
          - not_null

      - name: city
        description: City where the community is located.
        tests:
          - not_null

      - name: plan_name
        description: Home floor plan name.
        tests:
          - not_null

      - name: sqft
        description: Total square footage of the home.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: bedrooms
        description: Number of bedrooms.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 1 and 10"

      - name: bathrooms
        description: Number of bathrooms, including half-bath increments (e.g. 2.5).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 1 and 10"

      - name: base_price
        description: Base list price before upgrades or incentives.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: upgrade_amount
        description: Total upgrade value selected by the buyer. Zero if none selected.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: incentive_amount
        description: Total discount applied to the contract. Zero if none offered.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: contract_price
        description: "Final sale price. Equals base_price + upgrade_amount − incentive_amount."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: contract_date
        description: Date the contract was signed.
        tests:
          - not_null

      - name: close_date
        description: Date the home closed. Null for non-closed contracts.

      - name: days_to_close
        description: Calendar days between contract_date and close_date. Null when close_date is null.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                where: "close_date is not null"

      - name: status
        description: "Contract status. Closed = funded; Cancelled = voided; Under Contract = in process."
        tests:
          - not_null
          - accepted_values:
              values:
                - Closed
                - Cancelled
                - Under Contract

      - name: is_closed
        description: "True when status = 'Closed'."

      - name: is_cancelled
        description: "True when status = 'Cancelled'."

      - name: is_under_contract
        description: "True when status = 'Under Contract'."

      - name: sales_consultant
        description: Sales consultant who handled the contract.
        tests:
          - not_null

      - name: buyer_source
        description: Lead source channel (e.g. Realtor, Online, Drive-By).
        tests:
          - not_null

      - name: loan_type
        description: Financing type (e.g. Conventional, FHA, VA, Cash).
        tests:
          - not_null

      - name: agent_commission
        description: Agent commission in dollars. Feeds into estimated_margin_pct in fct_home_sales.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: days_to_close_calc
        description: "DATEDIFF(contract_date, close_date). Null when close_date is null."

      - name: contract_price_calc
        description: "base_price + upgrade_amount − incentive_amount."

  - name: stg_regional_manager
    description: Passthrough view over the regional_manager_lookup seed. One row per sales region.
    columns:
      - name: region
        description: Sales region name. Joins to stg_homebuilder_sales.region.

      - name: regional_manager
        description: Regional Manager for the region.

      - name: sales_target_units
        description: Annual unit sales target. Annualize actuals before comparing.

      - name: margin_target_pct
        description: "Target margin percentage (0–1). Compare against estimated_margin_pct in fct_home_sales."
