version: 2

sources:
  - name: rhodes_raw
    # Jinja is not supported in source YAML — database is hardcoded to RHODES.
    database: RHODES
    schema: RAW
    description: "Raw tables loaded into RHODES.RAW from source CSVs."
    tables:
      - name: homebuilder_sales
        description: "One row per home sale contract."
        # freshness: disabled — static snapshot, not a live feed
        columns:
          - name: contract_id
            description: Unique contract identifier.
            tests:
              - unique
              - not_null

          - name: region
            description: Sales region.
            tests:
              - accepted_values:
                  values:
                    - South Texas
                    - Rio Grande Valley
                    - Coastal Bend

          - name: status
            description: Contract status.
            tests:
              - accepted_values:
                  values:
                    - Closed
                    - Cancelled
                    - Under Contract

          - name: contract_date
            description: Date the contract was signed.
            tests:
              - not_null
