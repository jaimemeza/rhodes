version: 2

seeds:
  - name: regional_manager_lookup
    description: "One row per sales region with the assigned manager, unit target, and margin target."
    config:
      column_types:
        region: varchar
        regional_manager: varchar
        sales_target_units: number
        margin_target_pct: number(5,4)
    columns:
      - name: region
        description: Sales region name.
        tests:
          - unique
          - not_null
          - accepted_values:
              values:
                - South Texas
                - Rio Grande Valley
                - Coastal Bend

      - name: regional_manager
        description: Regional Manager for the region.
        tests:
          - not_null
          - unique

      - name: sales_target_units
        description: Annual unit sales target. Annualize actuals before comparing.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: margin_target_pct
        description: "Target margin percentage (0–1). Compare against estimated_margin_pct in fct_home_sales."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
